name: Android CI

# Runs on pull requests targeting `main` and on PR comments for manual jobs.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to record baselines for
        required: false
        default: ''

# Cancel superseded runs when new commits are pushed to the same PR branch.
concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Clean verification build
        run: ./gradlew clean build

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest

      - name: Verify screenshot tests (Roborazzi, JVM)
        run: ./gradlew verifyRoborazziDebug

      - name: Upload test & lint reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/outputs/roborazzi/
          if-no-files-found: ignore
          retention-days: 7

  record-screenshots:
    name: Record & commit screenshot baselines
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/record-screenshots'))

    steps:
      - name: Get PR branch (comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.ref || github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Record Roborazzi baselines
        run: ./gradlew recordRoborazziDebug

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/src/test/screenshots/**"
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update Roborazzi screenshot baselines"
            git push
          fi
