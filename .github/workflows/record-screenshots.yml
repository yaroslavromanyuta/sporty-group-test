name: Record Screenshots

# Manually triggered to regenerate Roborazzi baselines on the CI Linux runner.
# Run this after any intentional UI change to update the committed baseline PNGs.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to record baselines for
        required: false
        default: ''

permissions:
  contents: write

jobs:
  record:
    name: Record & commit baselines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Record Roborazzi baselines
        run: ./gradlew recordRoborazziDebug

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/src/test/screenshots/**"
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update Roborazzi screenshot baselines"
            git push
          fi